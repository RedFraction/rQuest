<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>XRQuest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Подключаем A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <!-- Подключаем наши стили -->
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- Интерфейс -->
    <div id="ui-layer">
      Счет: <span id="score">0</span>
    </div>

    <!-- Сцена -->
    <a-scene 
      webxr="optionalFeatures: hit-test, dom-overlay; overlayElement: #ui-layer"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      background="color: #ECECEC">

      <a-assets>
        <img id="floor-texture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      </a-assets>

      <!-- Освещение -->
      <a-entity light="type: ambient; color: #BBB"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 1.2" position="-1 2 1"></a-entity>

      <!-- Пол -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#DDD" shadow></a-plane>

      <!-- Контейнер для предметов -->
      <a-entity id="items-container"></a-entity>

      <!-- Камера и контроллеры -->
      <a-entity id="rig">
        <a-camera id="camera" position="0 1.6 0" look-controls>
            <a-cursor color="cyan" scale="1.5 1.5 1.5"></a-cursor>
        </a-camera>

        <!-- Контроллеры -->
        <a-entity laser-controls="hand: left" raycaster="objects: .grabbable; far: 10" line-color="cyan"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .grabbable; far: 10" line-color="cyan"></a-entity>
      </a-entity>

    </a-scene>

    <!-- Подключаем логику игры -->
    <script src="game.js"></script>
  </body>
</html>
