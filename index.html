<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MR Quest 3: Pick Up Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- Интерфейс -->
    <div id="ui-layer">
      <div>📦 Счет: <span id="score">0</span></div>
      <div id="controls-hint">🖱️ Клик / Q / E - Поднять предмет</div>
    </div>

    <!-- Отладочная панель -->
    <div id="debug-panel">
      <div><strong>🔧 DEBUG PANEL</strong></div>
      <div id="debug-mode">Режим: PC</div>
      <div id="debug-objects">Объектов в сцене: 0</div>
      <div id="debug-cursor">Курсор: не инициализирован</div>
      <div id="debug-intersection">Пересечение: нет</div>
      <div id="debug-event">Событие: -</div>
      <div id="debug-grab">Захват: -</div>
    </div>

    <!-- Сцена -->
    <a-scene 
      id="scene"
      webxr="optionalFeatures: hit-test, dom-overlay; overlayElement: #ui-layer"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      background="color: #ECECEC">

      <a-assets>
        <img id="floor-texture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      </a-assets>

      <!-- Освещение -->
      <a-entity light="type: ambient; color: #BBB"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 1.2" position="-1 2 1"></a-entity>

      <!-- Пол -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#DDD" shadow></a-plane>

      <!-- Контейнер для предметов -->
      <a-entity id="items-container"></a-entity>

      <!-- Камера с курсором -->
      <a-entity id="rig">
        <a-camera id="camera" position="0 1.6 0" look-controls wasd-controls>
            <!-- Курсор для ПК -->
            <a-entity 
              id="cursor"
              geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
              material="color: cyan; shader: flat"
              position="0 0 -1"
              scale="1.5 1.5 1.5"
              cursor="fuse: false; rayOrigin: mouse"
              raycaster="objects: .grabbable; far: 10">
            </a-entity>
        </a-camera>

        <!-- Контроллеры для VR -->
        <a-entity 
          id="left-controller" 
          laser-controls="hand: left"
          raycaster="objects: .grabbable; far: 10">
        </a-entity>
        
        <a-entity 
          id="right-controller" 
          laser-controls="hand: right"
          raycaster="objects: .grabbable; far: 10">
        </a-entity>
      </a-entity>

    </a-scene>

    <script src="game.js"></script>
  </body>
</html>
